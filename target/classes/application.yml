spring:
  application:
    name: SyncBridge

  datasource:
    url: jdbc:postgresql://localhost:5432/syncbridge
    username: syncbridge_user
    password: syncbridge_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          salesforce:
            client-id: ${SALESFORCE_CLIENT_ID:your-client-id}
            client-secret: ${SALESFORCE_CLIENT_SECRET:your-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: ${SALESFORCE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/salesforce}
            scope: api,refresh_token
        provider:
          salesforce:
            authorization-uri: ${SALESFORCE_AUTH_URI:https://login.salesforce.com/services/oauth2/authorize}
            token-uri: ${SALESFORCE_TOKEN_URI:https://login.salesforce.com/services/oauth2/token}
            user-info-uri: ${SALESFORCE_USER_INFO_URI:https://login.salesforce.com/services/oauth2/userinfo}
            user-name-attribute: preferred_username

server:
  port: 8080

logging:
  level:
    com.syncbridge: DEBUG
    org.springframework.security: DEBUG

# Salesforce environment variables (set these in your environment or .env file)
salesforce:
  client-id: ${SALESFORCE_CLIENT_ID:mock-client-id}
  client-secret: ${SALESFORCE_CLIENT_SECRET:mock-client-secret}
  authorization-uri: ${SALESFORCE_AUTH_URI:https://login.salesforce.com/services/oauth2/authorize}
  token-uri: ${SALESFORCE_TOKEN_URI:https://login.salesforce.com/services/oauth2/token}
  user-info-uri: ${SALESFORCE_USER_INFO_URI:https://login.salesforce.com/services/oauth2/userinfo}