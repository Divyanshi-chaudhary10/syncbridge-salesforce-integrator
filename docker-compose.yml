version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: syncbridge-postgres
    environment:
      POSTGRES_DB: syncbridge
      POSTGRES_USER: syncbridge_user
      POSTGRES_PASSWORD: syncbridge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - syncbridge-network

volumes:
  postgres_data:

networks:
  syncbridge-network:
    driver: bridge